<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShuhiLab</title>

<style>

:root {
  --green-bg: #2e7d5b;      /* основной фон */
  --green-light: #3f9a72;   /* для блоков */
  --bone: #f1e8d8;          /* костяной акцент */
  --white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--green-bg);
  color: var(--white);
}

/* ===== HEADER ===== */

header {
  padding: 20px 0;
}

.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--bone);
}

.nav-links a {
  text-decoration: none;
  color: var(--white);
  margin-left: 25px;
  font-weight: 500;
  transition: 0.3s;
}

.nav-links a:hover {
  color: var(--bone);
}

/* ===== HERO ===== */

.hero {
  text-align: center;
  padding: 80px 0 60px 0;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

.hero p {
  opacity: 0.9;
  margin-bottom: 30px;
}

.hero button {
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  background: var(--bone);
  color: var(--green-bg);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  background: var(--white);
}

/* ===== CATEGORIES ===== */

.categories {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 50px;
}

.category {
  padding: 10px 22px;
  border-radius: 20px;
  background: var(--green-light);
  cursor: pointer;
  transition: 0.3s;
}

.category:hover {
  background: var(--bone);
  color: var(--green-bg);
}

/* ===== PRODUCTS ===== */

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding-bottom: 70px;
}

.card {
  background: var(--green-light);
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 18px;
}

.card h3 {
  margin-bottom: 8px;
  color: var(--bone);
}

.card p {
  font-size: 14px;
  opacity: 0.9;
}

.price {
  margin: 12px 0;
  font-weight: bold;
  font-size: 18px;
}

.card button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: var(--bone);
  color: var(--green-bg);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.card button:hover {
  background: var(--white);
}

/* ===== FOOTER ===== */

footer {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
  opacity: 0.8;
}

</style>
</head>
<body>

<header>
  <div class="container nav">
    <div class="logo">ShuhiLab</div>
    <div class="nav-links">
      <a href="#">Меню</a>
      <a href="#">Акції</a>
      <a href="#">Про нас</a>
      <a href="#">Контакти</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Суші, що закохують з першого шматка</h1>
    <p>Доставка свіжих ролів та сетів прямо до тебе</p>
    <button>Переглянути меню</button>
  </div>
</section>

<section class="container">

  <div class="categories">
    <div class="category">🍱 Сети</div>
    <div class="category">🍣 Роли</div>
    <div class="category">🔥 Гарячі</div>
    <div class="category">🥤 Напої</div>
  </div>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/400x300" alt="">
      <div class="card-content">
        <h3>Філадельфія</h3>
        <p>280 г</p>
        <div class="price">199 грн</div>
        <button>В кошик</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300" alt="">
      <div class="card-content">
        <h3>Каліфорнія</h3>
        <p>260 г</p>
        <div class="price">179 грн</div>
        <button>В кошик</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300" alt="">
      <div class="card-content">
        <h3>Сет ShuhiLab</h3>
        <p>900 г</p>
        <div class="price">599 грн</div>
        <button>В кошик</button>
      </div>
    </div>

  </div>

</section>

<footer>
  © 2026 ShuhiLab | Доставка суші
</footer>

</body>
</html>
