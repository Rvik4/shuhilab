<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShuhiLab</title>

<style>
:root {
  --green-bg:#2e7d5b;
  --green-light:#3f9a72;
  --bone:#f1e8d8;
  --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:var(--green-bg);color:white;overflow-x:hidden;}
.container{width:90%;max-width:1200px;margin:auto;}

header{padding:20px 0;}
.nav{display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:24px;font-weight:bold;color:var(--bone);}
.nav-links a{color:white;margin-left:20px;cursor:pointer;text-decoration:none;transition:.3s;}
.nav-links a:hover{color:var(--bone);}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding-bottom:60px;
}

.card{
background:var(--green-light);
border-radius:15px;
padding:20px;
transform:translateY(20px);
opacity:0;
animation:fadeUp .6s forwards;
}

.card:nth-child(2){animation-delay:.1s;}
.card:nth-child(3){animation-delay:.2s;}

@keyframes fadeUp{
to{transform:translateY(0);opacity:1;}
}

.card h3{color:var(--bone);}
.price{margin:10px 0;font-weight:bold;}

.card button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:var(--bone);
color:var(--green-bg);
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.card button:active{
transform:scale(.95);
}

/* CART PANEL */
.cart{
position:fixed;
top:0;
right:0;
width:350px;
height:100%;
background:var(--green-light);
padding:20px;
transform:translateX(100%);
transition:.4s cubic-bezier(.77,0,.18,1);
z-index:1001;
overflow-y:auto;
}

.cart.active{
transform:translateX(0);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
opacity:0;
visibility:hidden;
transition:.3s;
z-index:1000;
}

.overlay.active{
opacity:1;
visibility:visible;
}

.cart-item{
margin-bottom:15px;
border-bottom:1px solid rgba(255,255,255,.2);
padding-bottom:10px;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateX(20px);}
to{opacity:1;transform:translateX(0);}
}

.quantity-controls{
display:flex;
gap:10px;
margin-top:5px;
}

.quantity-controls button{
width:25px;height:25px;
border:none;
background:var(--bone);
color:var(--green-bg);
font-weight:bold;
cursor:pointer;
}

.total{margin-top:15px;font-weight:bold;}

.checkout-btn{
margin-top:15px;
width:100%;
padding:10px;
background:var(--bone);
border:none;
color:var(--green-bg);
font-weight:bold;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:var(--green-light);
padding:25px;
width:300px;
border-radius:12px;
animation:pop .3s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.modal input{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

.modal button{
width:100%;
padding:8px;
border:none;
background:var(--bone);
color:var(--green-bg);
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<div class="container nav">
<div class="logo">ShuhiLab</div>
<div class="nav-links">
<a onclick="toggleCart()">Кошик (<span id="cart-count">0</span>)</a>
</div>
</div>
</header>

<section class="container">
<div class="products">

<div class="card">
<h3>Філадельфія</h3>
<div class="price">199 грн</div>
<button onclick="addToCart('Філадельфія',199)">В кошик</button>
</div>

<div class="card">
<h3>Каліфорнія</h3>
<div class="price">179 грн</div>
<button onclick="addToCart('Каліфорнія',179)">В кошик</button>
</div>

<div class="card">
<h3>Сет ShuhiLab</h3>
<div class="price">599 грн</div>
<button onclick="addToCart('Сет ShuhiLab',599)">В кошик</button>
</div>

</div>
</section>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<h2>Ваш кошик</h2>
<div id="cart-items"></div>
<div class="total">Сума: <span id="total-price">0</span> грн</div>
<button class="checkout-btn" onclick="openCheckout()">Оформити</button>
</div>

<div class="modal" id="checkout-modal">
<div class="modal-content">
<h3>Оформлення</h3>
<input type="text" id="name" placeholder="Ім'я">
<input type="text" id="phone" placeholder="Телефон">
<input type="text" id="address" placeholder="Адреса">
<button onclick="sendOrder()">Відправити</button>
</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){ localStorage.setItem("cart", JSON.stringify(cart)); }

function updateCart(){
const cartItems=document.getElementById("cart-items");
const totalPrice=document.getElementById("total-price");
const cartCount=document.getElementById("cart-count");
cartItems.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price*item.quantity;
cartItems.innerHTML+=`
<div class="cart-item">
<div>${item.name}</div>
<div>${item.price} грн</div>
<div class="quantity-controls">
<button onclick="changeQuantity(${index},-1)">-</button>
<span>${item.quantity}</span>
<button onclick="changeQuantity(${index},1)">+</button>
</div>
</div>`;
});

totalPrice.innerText=total;
cartCount.innerText=cart.reduce((sum,i)=>sum+i.quantity,0);
}

function addToCart(name,price){
const existing=cart.find(i=>i.name===name);
if(existing){existing.quantity++;}
else{cart.push({name,price,quantity:1});}
saveCart();
updateCart();
}

function changeQuantity(index,change){
cart[index].quantity+=change;
if(cart[index].quantity<=0)cart.splice(index,1);
saveCart();
updateCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function openCheckout(){
document.getElementById("checkout-modal").style.display="flex";
}

async function sendOrder(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

let message=`🛒 НОВЕ ЗАМОВЛЕННЯ\n\n`;
cart.forEach(item=>{
message+=`${item.name} x${item.quantity}\n`;
});
message+=`\nСума: ${document.getElementById("total-price").innerText} грн\n\nІм'я: ${name}\nТелефон: ${phone}\nАдреса: ${address}`;

const BOT_TOKEN="YOUR_BOT_TOKEN";
const CHAT_ID="YOUR_CHAT_ID";

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT_ID,text:message})
});

alert("Замовлення відправлено!");
cart=[];
saveCart();
updateCart();
document.getElementById("checkout-modal").style.display="none";
toggleCart();
}

updateCart();
</script>

</body>
</html>
