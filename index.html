<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShuhiLab</title>

<style>
:root {
  --green-bg: #2e7d5b;
  --green-light: #3f9a72;
  --bone: #f1e8d8;
  --white: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--green-bg);
  color: var(--white);
}

/* HEADER */

header {
  padding: 20px 0;
}

.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--bone);
}

.nav-links a {
  text-decoration: none;
  color: var(--white);
  margin-left: 25px;
  font-weight: 500;
  cursor: pointer;
}

.nav-links a:hover {
  color: var(--bone);
}

/* HERO */

.hero {
  text-align: center;
  padding: 70px 0;
}

/* PRODUCTS */

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  padding-bottom: 70px;
}

.card {
  background: var(--green-light);
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 18px;
}

.card h3 {
  color: var(--bone);
}

.price {
  margin: 10px 0;
  font-weight: bold;
}

.card button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: var(--bone);
  color: var(--green-bg);
  font-weight: bold;
  cursor: pointer;
}

/* CART PANEL */

.cart {
  position: fixed;
  top: 0;
  right: -400px;
  width: 350px;
  height: 100%;
  background: var(--green-light);
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
  z-index: 1000;
}

.cart.active {
  right: 0;
}

.cart h2 {
  margin-bottom: 20px;
  color: var(--bone);
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.cart-item button {
  background: none;
  border: none;
  color: var(--bone);
  cursor: pointer;
}

.total {
  margin-top: 20px;
  font-weight: bold;
  font-size: 18px;
}

.close-cart {
  cursor: pointer;
  margin-bottom: 15px;
  display: inline-block;
}

footer {
  text-align: center;
  padding: 30px 0;
  opacity: 0.8;
}

</style>
</head>
<body>

<header>
  <div class="container nav">
    <div class="logo">ShuhiLab</div>
    <div class="nav-links">
      <a>Меню</a>
      <a>Акції</a>
      <a>Про нас</a>
      <a onclick="toggleCart()">Кошик (<span id="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<section class="container">
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <h3>Філадельфія</h3>
        <div class="price">199</div>
        <button onclick="addToCart('Філадельфія',199)">В кошик</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <h3>Каліфорнія</h3>
        <div class="price">179</div>
        <button onclick="addToCart('Каліфорнія',179)">В кошик</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="card-content">
        <h3>Сет ShuhiLab</h3>
        <div class="price">599</div>
        <button onclick="addToCart('Сет ShuhiLab',599)">В кошик</button>
      </div>
    </div>

  </div>
</section>

<!-- CART -->

<div class="cart" id="cart">
  <div class="close-cart" onclick="toggleCart()">✖ Закрити</div>
  <h2>Ваш кошик</h2>
  <div id="cart-items"></div>
  <div class="total">Сума: <span id="total-price">0</span> грн</div>
</div>

<footer>
  © 2026 ShuhiLab
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCart() {
  const cartItems = document.getElementById("cart-items");
  const totalPrice = document.getElementById("total-price");
  const cartCount = document.getElementById("cart-count");

  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    cartItems.innerHTML += `
      <div class="cart-item">
        <span>${item.name} - ${item.price} грн</span>
        <button onclick="removeFromCart(${index})">✖</button>
      </div>
    `;
  });

  totalPrice.innerText = total;
  cartCount.innerText = cart.length;
}

function addToCart(name, price) {
  cart.push({ name, price });
  saveCart();
  updateCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  updateCart();
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

updateCart();
</script>

</body>
</html>
