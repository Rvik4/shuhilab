<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ShuhiLab Меню</title>
<style>
  :root {
    --red: #e60012;
    --dark-blue: #0a1f55;
    --light-gray: #f9f9f9;
    --text-color: #222;
  }
  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: var(--light-gray);
    color: var(--text-color);
  }
  header {
    background: var(--dark-blue);
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 2000;
  }
  .logo {
    font-weight: 700;
    font-size: 24px;
    user-select: none;
  }
  nav {
    display: flex;
    align-items: center;
    gap: 15px;
  }
  nav button, nav a {
    cursor: pointer;
    background: none;
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    user-select: none;
    transition: background 0.3s;
  }
  nav button:hover, nav a:hover {
    background: var(--red);
  }
  nav button.active {
    background: var(--red);
  }
  #info-message {
    text-align: center;
    padding: 12px 0;
    background: #fff5f5;
    color: var(--red);
    font-weight: 600;
    display: none;
  }
  #home-section {
    margin-top: 30px;
    display: flex;
    gap: 30px;
    justify-content: center;
  }
  .big-btn {
    background: var(--dark-blue);
    color: white;
    font-weight: 700;
    padding: 30px 50px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 22px;
    user-select: none;
    transition: background 0.3s;
  }
  .big-btn:hover {
    background: var(--red);
  }
  .products {
    display: none;
    margin: 30px auto;
    gap: 20px;
    max-width: 1200px;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    display: grid;
  }
  .products.active {
    display: grid;
  }
  .card {
    position: relative;
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 7px rgb(0 0 0 / 0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }
  .card-content {
    padding: 15px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  .weight {
    font-size: 14px;
    margin-bottom: 6px;
    color: #555;
  }
  .title {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .description {
    font-size: 13px;
    color: #777;
    flex-grow: 1;
    margin-bottom: 10px;
  }
  .prices {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 10px;
    color: var(--red);
  }
  .btn-cart {
    background: var(--red);
    border: none;
    color: white;
    font-weight: 700;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .btn-cart:hover {
    background: #b3000f;
  }
  .cart {
    position: fixed;
    top: 0;
    right: 0;
    width: 380px;
    height: 100%;
    background: white;
    box-shadow: -3px 0 10px rgb(0 0 0 / 0.2);
    padding: 20px;
    transform: translateX(100%);
    transition: transform 0.4s ease;
    z-index: 10000;
    display: flex;
    flex-direction: column;
  }
  .cart.active {
    transform: translateX(0);
  }
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .cart-header h2 {
    margin: 0;
    font-size: 20px;
    color: var(--dark-blue);
  }
  .close-cart {
    cursor: pointer;
    font-size: 24px;
    color: var(--red);
    font-weight: bold;
    user-select: none;
  }
  #cart-items {
    flex-grow: 1;
    overflow-y: auto;
    margin-bottom: 10px;
  }
  .cart-item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
  }
  .cart-item-name {
    font-weight: 700;
    margin-bottom: 5px;
  }
  .cart-item-price {
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--red);
  }
  .quantity-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .quantity-controls button {
    width: 28px;
    height: 28px;
    border: none;
    background: var(--red);
    color: white;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
  }
  .quantity-controls span {
    font-weight: 700;
    min-width: 20px;
    text-align: center;
  }
  .cart-total {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 15px;
    color: var(--dark-blue);
  }
  .checkout-btn {
    background: var(--red);
    border: none;
    color: white;
    font-weight: 700;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .checkout-btn:hover {
    background: #b3000f;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
    z-index: 9999;
  }
  .overlay.active {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 11000;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 12px;
    position: relative;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }
  .modal-content h3 {
    margin-top: 0;
    margin-bottom: 15px;
    color: var(--dark-blue);
  }
  .modal-content input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
  }
  .modal-content button {
    width: 100%;
    padding: 12px;
    background: var(--red);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .modal-content button:hover {
    background: #b3000f;
  }
  .close-modal {
    position: absolute;
    right: 15px;
    top: 12px;
    font-size: 24px;
    cursor: pointer;
    color: var(--red);
    user-select: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">ShuhiLab</div>
  <nav>
    <button id="homeBtn" class="active">Головна</button>
    <a href="#" id="aboutLink">Про нас</a>
    <a href="#" id="contactLink">Контакти</a>
    <button id="cartToggleBtn">Кошик (<span id="cart-count-header">0</span>)</button>
  </nav>
</header>

<div id="info-message"></div>

<div class="container">
  <div id="home-section">
    <button class="big-btn" data-section="wok">WOK</button>
    <button class="big-btn" data-section="rolls">Роли</button>
    <button class="big-btn" data-section="sets">Сети</button>
  </div>

  <div id="wok" class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1562967916-eb82221dfb3a?auto=format&fit=crop&w=400&q=80" alt="WOK курка" />
      <div class="card-content">
        <div class="weight">350 г</div>
        <div class="title">WOK курка</div>
        <div class="description">Смажена курка з овочами та соусом теріякі.</div>
        <div class="prices">149 грн</div>
        <button class="btn-cart" onclick="addToCart('WOK курка',149)">В кошик</button>
      </div>
    </div>
  </div>

  <div id="rolls" class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1617191517000-8b1b1b845a70?auto=format&fit=crop&w=400&q=80" alt="Філадельфія" />
      <div class="card-content">
        <div class="weight">270 г</div>
        <div class="title">Філадельфія</div>
        <div class="description">Рис, лосось, крем сир, авокадо, огірок, норі.</div>
        <div class="prices">199 грн</div>
        <button class="btn-cart" onclick="addToCart('Філадельфія',199)">В кошик</button>
      </div>
    </div>
  </div>

  <div id="sets" class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1584978145932-30dbd0d33059?auto=format&fit=crop&w=400&q=80" alt="Сет Сінсей" />
      <div class="card-content">
        <div class="weight">1080 г</div>
        <div class="title">Сет Сінсей</div>
        <div class="description">Каліфорнія темпура, Темпура рол з куркою, Запечений з крабовим міксом.</div>
        <div class="prices">699 грн</div>
        <button class="btn-cart" onclick="addToCart('Сет Сінсей',699)">В кошик</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
